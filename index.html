<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width initial-scale=1.0"/>
    <meta name="apple-mobile-web-app-capable" content="yes"/>
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
    <meta name="mobile-web-app-capable" content="yes"/>
    <link rel="stylesheet" href="./assets/css/index.css"/>
    <title>Torch</title>
  </head>
  <body>
    <header id="header">
      <div id="torch-switch" class="header-item">
	<div class="item-shader"></div>
      </div>
      <div id="menu" class="header-item">
	<div class="menu-item-shader item-shader"></div>
	<div id="menu-div-a" class="menu-div"></div>
	<div id="menu-div-b" class="menu-div"></div>
	<div id="menu-div-c" class="menu-div"></div>
      </div>
    </header>
    <div id="settings-panel" class="settings-panel">
      <div class="settings-panel-item">
	<div id="decrement-r" class="increment-item region-item">
	</div>
	<div id="r-current-value" class="current-value-display region-item">
	</div>
	<div id="increment-r" class="increment-item region-item">
	</div>
      </div>
      <div class="settings-panel-item">
	<div id="decrement-g" class="increment-item region-item">
	</div>
	<div id="g-current-value" class="current-value-display region-item">
	</div>
	<div id="increment-g" class="increment-item region-item">
	</div>
      </div>
      <div class="settings-panel-item">
	<div id="decrement-b" class="increment-item region-item">
	</div>
	<div id="b-current-value" class="current-value-display region-item">
	</div>
	<div id="increment-b" class="increment-item region-item">
	</div>
      </div>
      <div class="settings-panel-item">
	<div id="v-toggle" class="region-item">
	</div>
      </div>
    </div>
    <div id="area-shader" class="area-shader">
    </div>
    <div id="main-area-vignette" class="main-area-vignette">
    </div>
    <div id="main-area" class="main-area">
    </div>
    <script src="./assets/js/script.js"></script>
  </body>
</html>
